services:
  - type: pserv
    name: ruoyi-mysql
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./wms-mysql/Dockerfile
    dockerContext: .
    envVars:
      - key: MYSQL_DATABASE
        value: ry_wms
      - key: MYSQL_USER
        value: ruoyi
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: keyvalue
    name: ruoyi-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: ruoyi
    runtime: docker
    rootDir: wms-ruoyi
    plan: free
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: TZ
        value: Asia/Shanghai
      - key: MYSQL_HOST
        fromService:
          name: ruoyi-mysql
          type: pserv
          property: host
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: ry_wms
      - key: MYSQL_USER
        value: ruoyi
      - key: MYSQL_PASSWORD
        fromService:
          name: ruoyi-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: REDIS_URL
        fromService:
          name: ruoyi-redis
          type: keyvalue
          property: connectionString

  - type: web
    name: ruoyi-vue
    runtime: static
    rootDir: ruo-yi-wms-vue
    buildCommand: npm ci && npm run build:prod
    staticPublishPath: dist
    envVars:
      - key: VITE_APP_BASE_API
        sync: false
      - key: VITE_APP_CONTEXT_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
