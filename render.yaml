services:
  - type: keyvalue
    name: ruoyi-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: ruoyi
    runtime: docker
    rootDir: wms-ruoyi
    plan: free
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: TZ
        value: Asia/Shanghai
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: ry_wms
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          name: ruoyi-redis
          type: keyvalue
          property: connectionString

  - type: web
    name: ruoyi-vue
    runtime: static
    rootDir: ruo-yi-wms-vue
    region: oregon
    buildCommand: npm ci && npm run build:prod
    staticPublishPath: dist
    envVars:
      - key: VITE_APP_BASE_API
        sync: false
      - key: VITE_APP_CONTEXT_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
