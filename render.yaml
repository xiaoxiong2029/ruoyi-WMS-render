services:
  - type: web
    name: ruoyi
    runtime: docker
    rootDir: wms-ruoyi
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: TZ
        value: Asia/Shanghai
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: ry_wms
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379

  - type: web
    name: ruoyi-vue
    runtime: static
    rootDir: ruo-yi-wms-vue
    buildCommand: npm ci && npm run build:prod
    staticPublishPath: dist
    envVars:
      - key: VITE_APP_BASE_API
        sync: false
      - key: VITE_APP_CONTEXT_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
