server:
  port: ${PORT:8080}

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    dynamic:
      p6spy: ${P6SPY:false}
      primary: master
      strict: true
      datasource:
        master:
          type: ${spring.datasource.type}
          driverClassName: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ry_wms}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true
          username: ${MYSQL_USER}
          password: ${MYSQL_PASSWORD}
        slave:
          lazy: true
          type: ${spring.datasource.type}
          driverClassName: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ry_wms}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true
          username: ${MYSQL_USER}
          password: ${MYSQL_PASSWORD}
      hikari:
        maxPoolSize: ${DB_MAX_POOL_SIZE:10}
        minIdle: ${DB_MIN_IDLE:2}
        connectionTimeout: 30000
        validationTimeout: 5000
        idleTimeout: 600000
        maxLifetime: 1800000
        keepaliveTime: 30000

spring.data:
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:}
    timeout: 10s
    ssl.enabled: ${REDIS_SSL:false}

redisson:
  keyPrefix: ${REDIS_KEY_PREFIX:}
  threads: 4
  nettyThreads: 8
  singleServerConfig:
    clientName: ${ruoyi.name}
    connectionMinimumIdleSize: 2
    connectionPoolSize: 8
    idleConnectionTimeout: 10000
    timeout: 3000
    subscriptionConnectionPoolSize: 8
